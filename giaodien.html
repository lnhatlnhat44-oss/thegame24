<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Thẻ VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Be Vietnam Pro';
    background:linear-gradient(135deg,#0f172a,#1e1b4b);
    color:#fff;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    background:rgba(255,255,255,0.05);
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    border-radius:16px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.12);
}

.price{
    color:#00f5ff;
    font-weight:bold;
}

/* BUTTON */
button{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
    font-weight:600;
}

.buy{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
}

/* CART */
.cart{
    position:fixed;
    right:15px;
    top:15px;
    width:220px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:12px;
    backdrop-filter:blur(10px);
}

/* QR BOX */
#qrBox{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    background:#fff;
    color:#000;
    padding:15px;
    border-radius:12px;
    display:none;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">🔥 SHOP THẺ VIP PRO</div>

<div class="cart">
🛒 Giỏ hàng<br>
<div id="cart"></div>
<hr>
Tổng: <b id="total">0</b>đ
<br>
<button onclick="checkout()">Thanh toán</button>
</div>

<div class="container">
<div class="card">
<h3>Garena 50K</h3>
<p class="price">45.000đ</p>

<button onclick="buy()">Mua ngay</button>
</div>

<div class="card">
<h3>Viettel 100K</h3>
<p class="price">95.000đ</p>

<button onclick="buy()">Mua ngay</button>
</div>
</div>

<!-- QR -->
<div id="qrBox">
<h3>Thanh toán MB BANK</h3>
<div id="qr"></div>
</div>

<script>
let total=0;

function buy(){
total+=45000;
update();
}

function update(){
document.getElementById("total").innerText=total;
document.getElementById("cart").innerHTML="1 sản phẩm";
}

function checkout(){
document.getElementById("qrBox").style.display="block";

document.getElementById("qr").innerHTML=`
<div style="font-size:14px">
MB BANK<br>
0941639570<br>
Số tiền: ${total}đ<br>
</div>`;
}
</script>

</body>
</html>
