<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thẻ của bạn</title>
<style>
body{text-align:center;font-family:Arial;background:#222;color:white}
.card{background:#fff;color:black;margin:10px;padding:10px;border-radius:10px}
</style>
</head>
<body>

<h2>THẺ CỦA BẠN</h2>
<div id="list"></div>

<script>
let order=JSON.parse(localStorage.getItem("order"));

function gen(){
let s="";
for(let i=0;i<12;i++) s+=Math.floor(Math.random()*10);
return s;
}

let html="";
for(let i=0;i<order.qty;i++){
html+=`
<div class="card">
Mã thẻ: ${gen()}<br>
Seri: ${gen()}
</div>`;
}

document.getElementById("list").innerHTML=html;
</script>

</body>
</html>
